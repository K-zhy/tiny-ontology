<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontology Demo — Observatory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="/static/vis-network.min.js"></script>
<style>
/* ============================================================
   Observatory — Warm Scholar Edition
   Palette: ivory · ink · vermillion · sage
   Typography: Playfair Display + DM Sans + JetBrains Mono
   ============================================================ */
:root {
  --bg-base:    #f5f0e8;
  --bg-surface: #faf7f2;
  --bg-raised:  #ffffff;
  --bg-input:   #f5f0e8;
  --border:     #e0d8cb;
  --border-lit: #c4b99a;
  --ink:        #2c2416;
  --ink-soft:   #5c5240;
  --ink-muted:  #9b8f7a;
  --accent:     #b8402a;
  --accent-dim: #8b2a1a;
  --sage:       #4a7c6f;
  --sage-dim:   #3a6257;
  --node-student: #4a7c6f;
  --node-teacher: #6b8c4a;
  --node-course:  #c08030;
  --node-score:   #c05050;
  --node-iface:   #7050a0;
  --radius: 3px;
  --ease: 160ms ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg-base);
  color: var(--ink);
  height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ---- header (NL query + controls, always visible) ---- */
.header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; gap: 14px;
  flex-shrink: 0; height: 52px;
}
.header .brand {
  font-family: 'Playfair Display', 'Palatino', serif;
  font-size: 19px; font-weight: 600; color: var(--ink);
  white-space: nowrap; letter-spacing: -0.01em;
}
.header .brand em { font-style: normal; color: var(--accent); }
.header .sep { width:1px; height:24px; background:var(--border); }
.header .nl-group { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.header .nl-group input {
  flex: 1; min-width: 0; max-width: 480px;
  padding: 7px 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--ink);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  outline: none; transition: border var(--ease);
}
.header .nl-group input:focus { border-color: var(--accent); }
.header .nl-group input::placeholder { color: var(--ink-muted); }
.header .nl-group .nl-btn {
  padding: 7px 16px;
  background: var(--ink); color: #fff;
  border: none; border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: background var(--ease);
}
.header .nl-group .nl-btn:hover { background: var(--accent); }
.header .nl-group .nl-btn:disabled { background: var(--ink-muted); cursor: not-allowed; }

.header .ctrl-group { display: flex; gap: 1px; }
.header .ctrl-group button {
  padding: 4px 10px;
  border: 1px solid var(--border);
  background: transparent; color: var(--ink-soft);
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all var(--ease); white-space: nowrap;
}
.header .ctrl-group button:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.header .ctrl-group button:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.header .ctrl-group button:hover { color: var(--ink); border-color: var(--border-lit); }
.header .ctrl-group button.active { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ---- main: graph + info sidebar ---- */
.main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

.graph-zone {
  flex: 0 0 360px; display: flex; flex-direction: column;
  background: #fefdfb; min-width: 0;
  overflow: hidden;
}
.graph-toolbar {
  padding: 5px 14px; border-bottom: 1px solid var(--border);
  display: flex; gap: 2px; align-items: center;
  background: var(--bg-surface);
}
.graph-toolbar .tsep { width:1px; background:var(--border); margin:0 8px; align-self:stretch; }
.graph-toolbar button {
  padding: 4px 12px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: transparent; color: var(--ink-soft);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500; transition: all var(--ease);
}
.graph-toolbar button:hover { color: var(--ink); background: var(--bg-base); border-color: var(--border-lit); }
.graph-toolbar button.active { color: #fff; background: var(--ink); border-color: var(--ink); }
.graph-toolbar .instance-only { display:none; }
#graph-container { flex:1; background:#fefdfb; overflow:hidden; min-height:0; }

/* ---- info sidebar ---- */
.info-sidebar {
  flex: 1; min-width: 240px; display: flex; flex-direction: column;
  background: var(--bg-surface);
  overflow: hidden;
}
.info-sidebar::-webkit-scrollbar { width:4px; }
.info-sidebar::-webkit-scrollbar-thumb { background:var(--border-lit); border-radius:2px; }
.info-pane { padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#answer-pane { display: flex; flex-direction: column; min-height: 52px; overflow: hidden; }
.info-pane:last-child { border-bottom: none; }
.info-pane.pane-expand { flex: 1; min-height: 120px; display: flex; flex-direction: column; overflow: hidden; }
.info-pane.pane-results { flex: 0 0 180px; min-height: 96px; overflow-y: auto; }
.info-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500;
  color: var(--ink-muted); letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 8px;
}
.answer-box {
  flex: 1; min-height: 0; overflow-y: auto;
  font-size: 13px; line-height: 1.7; color: var(--ink);
  display: none; padding: 10px 12px;
  background: #faf5ee; border: 1px solid var(--border-lit);
  border-radius: var(--radius); border-left: 2px solid var(--accent);
}
.answer-box::-webkit-scrollbar { width:4px; }
.answer-box::-webkit-scrollbar-thumb { background:var(--border-lit); border-radius:2px; }
.exploration-log { flex: 1; min-height: 0; overflow-y: auto; }
.exploration-log::-webkit-scrollbar { width:4px; }
.exploration-log::-webkit-scrollbar-thumb { background:var(--border-lit); border-radius:2px; }

/* ---- Available Tools panel ---- */
.tools-panel {
  flex-shrink: 0; max-height: 180px; overflow-y: auto;
  border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 8px;
}
.tools-panel::-webkit-scrollbar { width:4px; }
.tools-panel::-webkit-scrollbar-thumb { background:var(--border-lit); border-radius:2px; }
.tools-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 10px; cursor: pointer; user-select: none;
  background: var(--bg-base); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1;
}
.tools-panel-header span {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
  color: var(--ink-muted); letter-spacing: 0.06em; text-transform: uppercase;
}
.tools-panel-header .tp-count { color: var(--sage); }
.tools-panel-header .tp-arrow { font-size: 9px; color: var(--ink-muted); transition: transform 0.2s; }
.tools-panel-header.open .tp-arrow { transform: rotate(90deg); }
.tools-panel-body { display: none; padding: 4px 0; }
.tools-panel-body.open { display: block; }
.tool-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 4px 10px; border-bottom: 1px solid var(--border);
}
.tool-item:last-child { border-bottom: none; }
.tool-item .ti-name {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  color: var(--sage); white-space: nowrap; flex-shrink: 0; min-width: 120px;
}
.tool-item .ti-desc { font-size: 10px; color: var(--ink-soft); line-height: 1.4; }

/* ---- Round blocks ---- */
.round-block {
  border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 6px; overflow: hidden;
}
.round-header {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px; cursor: pointer; user-select: none;
  background: var(--bg-base); border-bottom: 1px solid transparent;
  transition: background var(--ease);
}
.round-header:hover { background: #f0ece3; }
.round-header .round-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  color: var(--ink); letter-spacing: 0.04em;
}
.round-header .round-calls { font-size: 10px; color: var(--ink-muted); flex: 1; }
.round-header .round-arrow { font-size: 9px; color: var(--ink-muted); transition: transform 0.2s; }
.round-body { display: none; padding: 6px 10px; border-top: 1px solid var(--border); }
.round-body.open { display: block; }

/* ---- Call card (per tool call inside a round) ---- */
.call-card {
  margin-bottom: 4px; border: 1px solid var(--border); border-radius: 2px;
  overflow: hidden;
}
.call-card:last-child { margin-bottom: 0; }
.call-card-header {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; background: var(--bg-surface);
}
.call-name {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600; color: var(--ink);
}
.call-summary { font-size: 10px; color: var(--sage); flex: 1; margin-left: 4px; }
.call-input {
  padding: 3px 8px; font-size: 10px; color: var(--ink-muted);
  word-break: break-all; border-top: 1px solid var(--border);
  background: #fdfaf6; font-family: 'JetBrains Mono', monospace;
}

.round-header .round-tools-badge {
  font-size: 9px; color: var(--sage); background: #f0f4ec;
  border: 1px solid #d5e0cf; border-radius: 10px;
  padding: 1px 6px; margin-left: 2px;
}

/* ---- 每轮工具清单（嵌入 round-body） ---- */
.round-tools {
  margin-top: 6px; border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
}
.round-tools-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 8px; cursor: pointer; user-select: none;
  background: #f7f4ee; font-size: 10px; color: var(--ink-muted);
}
.round-tools-header:hover { background: #f0ece3; }
.round-tools-label { font-size: 10px; color: var(--ink-muted); }
.round-tools-arrow { font-size: 9px; color: var(--ink-muted); }
.round-tools-body { display: none; padding: 4px 8px; background: #fdfaf6; }
.round-tools-body.open { display: block; }
.round-tools-item {
  display: flex; align-items: baseline; gap: 6px;
  padding: 2px 0; border-bottom: 1px solid var(--border);
}
.round-tools-item:last-child { border-bottom: none; }
.round-tools-item .ti-name {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600;
  color: var(--sage); white-space: nowrap; flex-shrink: 0; min-width: 110px;
}
.round-tools-item .ti-desc { font-size: 9.5px; color: var(--ink-soft); line-height: 1.3; }

/* ---- Reasoning bubble ---- */
.reasoning-bubble {
  background: #f5f0e8; border: 1px solid var(--border-lit);
  border-radius: var(--radius); border-left: 2px solid #c8a86e;
  padding: 5px 9px; margin-bottom: 4px;
  font-size: 10px; color: var(--ink-soft); font-style: italic; line-height: 1.5;
}
.reasoning-bubble::before { content: '💭 '; font-style: normal; }

.exploration-step {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
  font-size: 11px; animation: fadeStep 0.25s ease;
}
.exploration-step:last-child { border-bottom: none; }
.exploration-step .step-num {
  background: var(--ink); color: #fff;
  border-radius: 50%; width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}
.exploration-step .step-tool {
  font-weight: 600; color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
}
.exploration-step .step-input { color: var(--ink-muted); font-size: 10px; margin-top: 1px; word-break: break-all; }
.exploration-step .step-summary { color: var(--sage); font-size: 10px; margin-top: 2px; }
.step-tag {
  display: inline-block; padding: 1px 5px; border-radius: 2px;
  font-size: 9px; font-weight: 600; margin-right: 4px;
  background: #e8f0ec; color: var(--sage);
}
@keyframes fadeStep { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:translateY(0); } }

.result-table { width:100%; border-collapse:collapse; font-size:11px; }
.result-table th {
  background: var(--bg-base); padding: 5px 8px; text-align: left;
  border-bottom: 2px solid var(--border-lit); color: var(--ink-soft);
  font-weight: 500; font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing:0.04em;
}
.result-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); color: var(--ink); }
.badge-tag { display:inline-block; padding:1px 6px; border-radius:2px; font-size:10px; font-weight:600; }
.badge-pass { background: #e8f0ec; color: var(--sage); }
.badge-fail { background: #fce8e5; color: var(--accent); }

/* ---- resize handles ---- */
/* horizontal (bottom panel) */
.resize-handle {
  height: 5px; flex-shrink: 0; cursor: ns-resize;
  background: var(--border); position: relative; z-index: 10;
  transition: background var(--ease);
}
.resize-handle::after {
  content: ''; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  width: 36px; height: 3px; border-radius: 2px;
  background: var(--border-lit);
}
.resize-handle:hover, .resize-handle.dragging { background: var(--accent); }
.resize-handle:hover::after, .resize-handle.dragging::after { background: #fff; }

.sidebar-split-handle {
  height: 5px; margin: 0 10px; border-radius: 2px;
}
/* vertical (graph | sidebar) */
.resize-handle-v {
  width: 5px; flex-shrink: 0; cursor: ew-resize;
  background: var(--border); position: relative; z-index: 10;
  transition: background var(--ease);
}
.resize-handle-v::after {
  content: ''; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  width: 3px; height: 36px; border-radius: 2px;
  background: var(--border-lit);
}
.resize-handle-v:hover, .resize-handle-v.dragging { background: var(--accent); }
.resize-handle-v:hover::after, .resize-handle-v.dragging::after { background: #fff; }

/* ---- bottom panel (tabbed) ---- */
.bottom-panel {
  border-top: none; background: var(--bg-surface);
  flex-shrink: 0; display: flex; flex-direction: column;
  height: 240px; min-height: 48px; overflow: hidden;
}
.bottom-panel.collapsed { height: 37px !important; }
.bottom-panel.collapsed .tab-content { display: none; }
.tab-bar {
  display: flex; align-items: center; padding: 0 14px;
  border-bottom: 1px solid var(--border);
}
.tab-bar .tab-btn {
  padding: 9px 16px; border: none; border-bottom: 2px solid transparent;
  background: transparent; color: var(--ink-soft);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all var(--ease);
}
.tab-bar .tab-btn:hover { color: var(--ink); }
.tab-bar .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
.tab-bar .tab-toggle {
  margin-left: auto; padding: 4px 10px;
  background: transparent; border: none; color: var(--ink-muted);
  cursor: pointer; font-size: 14px; line-height: 1;
}

.tab-content { padding: 10px 14px; overflow-y: auto; height: calc(100% - 37px); display: none; }
.tab-content.active { display: block; }
.tab-content::-webkit-scrollbar { width:4px; }
.tab-content::-webkit-scrollbar-thumb { background:var(--border-lit); border-radius:2px; }

/* -- functions -- */
.func-group-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
  color: var(--sage); margin: 10px 0 4px; letter-spacing: 0.04em;
}
.func-card {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px; margin-bottom: 3px;
  display: flex; align-items: center; justify-content: space-between;
  transition: border var(--ease);
}
.func-card:hover { border-color: var(--border-lit); }
.func-card .func-info { flex:1; min-width:0; }
.func-card .func-name {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; color: var(--ink);
}
.func-card .func-meta { font-size: 10px; color: var(--ink-muted); margin-top: 2px; }
.func-card .func-dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:6px; }
.func-card button {
  padding: 4px 12px; border:1px solid var(--border); border-radius: var(--radius);
  background: transparent; color: var(--ink-soft);
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
  cursor: pointer; transition: all var(--ease); flex-shrink:0;
}
.func-card button:hover { border-color: var(--sage); color: var(--sage); background: #f5faf7; }

/* -- actions -- */
.action-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end; flex-wrap: wrap; }
.action-row .field-group { flex:1; min-width:80px; }
.action-row label {
  display: block; font-size: 10px; color: var(--ink-muted);
  font-weight: 500; margin-bottom: 3px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
}
.action-row input {
  width:100%; padding:5px 8px;
  background: var(--bg-input); border:1px solid var(--border); border-radius: var(--radius);
  color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 11px; outline: none;
}
.action-row input:focus { border-color: var(--accent); }
.action-btn {
  padding: 5px 14px; border:none; border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all var(--ease); white-space: nowrap; flex-shrink:0;
}
.action-btn.primary { background: var(--sage); color: #fff; }
.action-btn.primary:hover { background: var(--sage-dim); }
.action-btn.danger { background: var(--accent); color: #fff; }
.action-btn.danger:hover { background: var(--accent-dim); }

/* -- raw tables -- */
.raw-table-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; margin-bottom: 3px;
  border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; user-select: none; transition: all var(--ease);
  background: var(--bg-raised);
}
.raw-table-header:hover { border-color: var(--border-lit); background: #fdfaf3; }
.raw-table-header .tbl-name {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; color: var(--ink);
}
.raw-table-header .tbl-meta { font-size: 10px; color: var(--ink-muted); }
.raw-table-header .tbl-arrow { font-size: 10px; color: var(--ink-muted); transition: transform 0.2s; }
.raw-table-header.open .tbl-arrow { transform: rotate(90deg); }
.raw-table-body { display: none; margin-bottom: 6px; overflow-x: auto; max-height: 200px; }
.raw-table-body.open { display: block; }
.raw-table-body table { width:100%; border-collapse:collapse; font-family:'JetBrains Mono',monospace; font-size:10px; }
.raw-table-body th {
  background: #e8e2d5; padding: 4px 8px; text-align:left;
  border-bottom: 2px solid var(--border-lit); color: var(--ink-soft);
  font-weight:500; white-space:nowrap; position:sticky; top:0; z-index:1;
}
.raw-table-body td { padding: 3px 8px; border-bottom:1px solid var(--border); color: var(--ink); white-space:nowrap; }
.raw-table-body tr:hover td { background: #fdfaf3; }
.raw-table-body .col-pk { color: var(--accent); font-weight:500; }
.raw-table-body .col-fk { color: var(--sage); }

/* ---- misc ---- */
.spinner {
  display:inline-block; width:12px; height:12px;
  border:2px solid var(--border); border-top:2px solid var(--ink);
  border-radius:50%; animation:spin 0.6s linear infinite;
  vertical-align:middle; margin-right:6px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.error-msg { color: var(--accent); font-size:12px; }
.success-msg { color: var(--sage); font-size:12px; }
.muted { color: var(--ink-muted); font-size:11px; }
</style>
</head>
<body>

<header class="header">
  <div class="brand">Ontology&nbsp;<em>Demo</em></div>
  <div class="nl-group">
    <input id="nlInput" placeholder="张三高等数学多少分" onkeydown="if(event.key==='Enter')nlQuery()">
    <button class="nl-btn" id="nlBtn" onclick="nlQuery()">Query</button>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group" id="mode-toggles">
    <button id="btn-mode-oag" class="active" onclick="switchNlMode('oag')">AIP Logic</button>
    <button id="btn-mode-graph" onclick="switchNlMode('graph')">Graph Walk</button>
    <button id="btn-mode-batch" onclick="switchNlMode('batch')">Batch Plan</button>
  </div>
</header>

<div class="main">
  <div class="graph-zone">
    <div class="graph-toolbar">
      <button id="btn-schema" class="active" onclick="switchView('schema')">Type View</button>
      <button id="btn-instance" onclick="switchView('instance')">Instance View</button>
      <span class="tsep"></span>
      <button id="btn-filter-all" class="instance-only active" onclick="filterGraph('all')">All</button>

<script>
// ======================== 图谱 ========================
let graphData = { nodes: [], edges: [] };
let schemaData = { nodes: [], edges: [] };
let schemaMeta = null;
let currentView = 'schema';
let instanceFilter = 'all';
let nlQueryMode = 'oag';
let network = null;

const nodeColors = { Student: '#4a7c6f', Teacher: '#6b8c4a', Course: '#c08030', Score: '#c05050', Interface: '#7050a0' };

async function loadGraph() {
  try {
    const [schemaResp, instanceResp, metaResp] = await Promise.all([
      fetch('/ontology/graph/schema'), fetch('/ontology/graph'), fetch('/ontology/schema')
    ]);
    if (!schemaResp.ok || !instanceResp.ok) throw new Error('HTTP error');
    schemaData = await schemaResp.json();
    graphData = await instanceResp.json();
    schemaMeta = await metaResp.json();
    renderSchemaGraph();
    renderFunctionsPanel();
  } catch(e) {
    document.getElementById('graph-container').innerHTML =
      '<div style="padding:40px;text-align:center;color:var(--accent);">Graph load failed: '+e.message+'</div>';
    console.error('Graph load error:', e);
  }
}

function switchView(view) {
  currentView = view; instanceFilter = 'all';
  document.getElementById('btn-schema').classList.toggle('active', view==='schema');
  document.getElementById('btn-instance').classList.toggle('active', view==='instance');
  document.querySelectorAll('.instance-only').forEach(function(el){
    el.style.display = view==='instance'?'':'none';
  });
  if (view==='schema') { renderSchemaGraph(); } else { renderInstanceGraph('all'); }
}

function renderSchemaGraph() {
  var nodes = new vis.DataSet(
    schemaData.nodes.map(function(n) {
      if (n.group === 'Interface') return { ...n, color: { background: '#7050a0', border: '#4a3080' }, font: { color: '#fff', size: 15, face: 'DM Sans' } };
      var funcCount = schemaMeta && schemaMeta.functions
        ? Object.values(schemaMeta.functions).filter(function(f){return f.boundObject===n.group;}).length : 0;
      return {
        ...n,
        label: n.label + (funcCount>0?'\n'+funcCount+' Functions':''),
        color: { background: nodeColors[n.group]||'#888', border: '#333', highlight:{background:nodeColors[n.group]||'#888',border:'#111'} },
        font: { color: '#fff', size: 15, face: 'DM Sans', bold: { color:'#fff', size:15, face:'DM Sans' } },
        borderWidth: 2,
      };
    })
  );
  var edges = new vis.DataSet(schemaData.edges.map(function(e) { return {
    ...e, color: { color: '#4a7c6f', opacity: 0.4 },
    font: { color: '#b8402a', size: 10, background: '#fefdfb', strokeWidth: 3 },
    width: 2,
  }}));

  var container = document.getElementById('graph-container');
  var options = {
    physics: { enabled: true, solver: 'forceAtlas2Based',
      forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springLength: 200 }
    },
    interaction: { hover: true },
  };
  if (network) { network.destroy(); }
  network = new vis.Network(container, { nodes: nodes, edges: edges }, options);
  network.on('doubleClick', function(params) {
    if (params.nodes.length > 0) {
      var nodeId = params.nodes[0];
      if (nodeId.startsWith('Interface-')) return;
      var typeName = nodeId.replace('Type-', '');
      switchView('instance'); instanceFilter = typeName; renderInstanceGraph(typeName);
      document.querySelectorAll('.instance-only').forEach(function(b){b.classList.remove('active');});
      var btn = document.getElementById('btn-filter-'+typeName.toLowerCase());
      if(btn) btn.classList.add('active');
    }
  });
}

function renderInstanceGraph(filter) {
  var filteredNodes = graphData.nodes.filter(function(n){return !filter||filter==='all'||n.group===filter;});
  var nodes = new vis.DataSet(
    filteredNodes.map(function(n) {
      var c = nodeColors[n.group]||'#888';
      return {
        ...n, color: { background: c, border: '#333', highlight: { background: c, border: '#111' } },
        shape: 'dot', size: 18,
        font: { size: 12, color: '#2c2416', face: 'DM Sans', bold: '#2c2416', strokeWidth: 2, strokeColor: '#fefdfb' }
      };
    })
  );
  var nodeIds = new Set(filteredNodes.map(function(n){return n.id;}));
  var edges = new vis.DataSet(
    graphData.edges.filter(function(e){return nodeIds.has(e.from)&&nodeIds.has(e.to);})
      .map(function(e){return {...e,arrows:'to',color:{opacity:0.35,color:'#4a7c6f'},width:1.5,
        font:{size:9,color:'#b8402a',background:'#fefdfb',strokeWidth:3}};})
  );

  var container = document.getElementById('graph-container');
  var options = {
    physics: { stabilization: { iterations: 100 }, solver: 'forceAtlas2Based' },
    interaction: { hover: true, tooltipDelay: 200 },
  };
  if (network) { network.destroy(); }
  network = new vis.Network(container, { nodes: nodes, edges: edges }, options);
  network.on('click', function(params) {
    if (params.nodes.length > 0) expandNode(params.nodes[0]);
  });
}

// ======================== Functions ========================
function renderFunctionsPanel() {
  if (!schemaMeta||!schemaMeta.functions) return;
  var funcs = schemaMeta.functions;
  var grouped = {};
  for (var name in funcs) {
    var f = funcs[name];
    var obj = f.boundObject||'Other';
    if(!grouped[obj]) grouped[obj]=[];
    grouped[obj].push({name:name, def:f});
  }
  var html='', total=0;
  for (var objType in grouped) {
    var funcList = grouped[objType];
    html+='<div class="func-group-label">'+objType+'</div>';
    funcList.forEach(function(entry){
      total++;
      var f = entry.def;
      var isValidation = f.funcType==='validation';
      var isObjectSet = f.funcType==='object_set';
      var dotColor = isValidation?'var(--ink-muted)':(isObjectSet?'var(--node-course)':'var(--sage)');
      var funcId = 'func-'+entry.name;
      html+='<div class="func-card" style="opacity:'+(isValidation?'0.5':'1')+'">';
      html+='<div class="func-info">';
      html+='<span class="func-dot" style="background:'+dotColor+'"></span>';
      html+='<span class="func-name">'+entry.name+'</span>';
      html+='<span style="font-size:9px;color:var(--ink-muted);margin-left:6px;">'+(isValidation?'valid':(isObjectSet?'batch':'scalar'))+'</span>';
      html+='<div class="func-meta">'+(f.displayName||'')+' &rarr; '+f.returnType;
      if (f.params&&f.params.length>0) {
        html+=' &middot; params: '+f.params.map(function(p){return p.name+':'+p.type;}).join(', ');
      }
      html+='</div></div>';
      html+=!isValidation?'<button onclick="execFunction(\''+entry.name+'\',\''+objType+'\')">Run</button>':'<span style="font-size:10px;color:var(--ink-muted);">auto</span>';
      html+='<div id="'+funcId+'-result" style="margin-top:6px;display:none;"></div>';
      html+='</div>';
    });
  }
  document.getElementById('functions-list').innerHTML=html;
  document.getElementById('func-count').textContent='('+total+')';
}

async function execFunction(funcName,objType) {
  var funcId='func-'+funcName;
  var resultEl=document.getElementById(funcId+'-result');
  resultEl.style.display='block';
  resultEl.innerHTML='<span class="spinner"></span>running...';
  var funcDef=schemaMeta.functions[funcName];
  var params={};
  if(funcDef&&funcDef.params&&funcDef.params.length>0){
    for(var i=0;i<funcDef.params.length;i++){
      var p=funcDef.params[i];
      var hint=p.required?p.name+' ('+p.type+'):':p.name+' ('+p.type+', optional):';
      var val=prompt(hint,'');
      if(val===null){if(p.required){resultEl.innerHTML='cancelled';return;}continue;}
      if(val.trim()===''&&!p.required)continue;
      if(p.type==='integer'||p.type==='int'){params[p.name]=parseInt(val);}
      else if(p.type==='float'||p.type==='number'){params[p.name]=parseFloat(val);}
      else{params[p.name]=val;}
    }
  }
  var qp=[];
  for(var k in params) qp.push(k+'='+encodeURIComponent(params[k]));
  var url='/ontology/functions/'+funcName+(qp.length>0?'?'+qp.join('&'):'');
  try{
    var resp=await fetch(url);var data=await resp.json();
    if(data.success){
      var val=data.data;
      if(Array.isArray(val)){
        var table='<table class="result-table"><thead><tr>';
        var keys=Object.keys(val[0]||{}).filter(function(k){return !k.startsWith('_');});
        keys.forEach(function(k){table+='<th>'+k+'</th>';});
        table+='</tr></thead><tbody>';
        val.forEach(function(row){table+='<tr>';keys.forEach(function(k){table+='<td>'+(row[k]??'-')+'</td>';});table+='</tr>';});
        table+='</tbody></table>';
        resultEl.innerHTML=table;
      }else if(typeof val==='object'&&val!==null){
        resultEl.innerHTML='<pre style="font-size:10px;color:var(--ink-soft);margin-top:4px;">'+JSON.stringify(val,null,2)+'</pre>';
      }else{
        resultEl.innerHTML='<span style="font-weight:600;color:var(--sage);font-size:15px;">'+(val??'no data')+'</span>';
      }
    }else{resultEl.innerHTML='<span class="error-msg">'+data.error+'</span>';}
  }catch(e){resultEl.innerHTML='<span class="error-msg">'+e.message+'</span>';}
}

function filterGraph(type){
  instanceFilter=type;renderInstanceGraph(type);
  document.querySelectorAll('.graph-toolbar .instance-only').forEach(function(b){b.classList.remove('active');});
  var btn=document.getElementById('btn-filter-'+(type==='all'?'all':type.toLowerCase()));
  if(btn)btn.classList.add('active');
}

function expandNode(nodeId){
  var parts=nodeId.split('-');
  var relatedEdges=graphData.edges.filter(function(e){return e.from===nodeId||e.to===nodeId;});
  var relatedNodes=new Set();
  relatedEdges.forEach(function(e){relatedNodes.add(e.from);relatedNodes.add(e.to);});
  var visibleNodes=graphData.nodes.map(function(n){
    var c=nodeColors[n.group]||'#888';
    var isRelated=relatedNodes.has(n.id);
    return{
      id:n.id,
      label:isRelated?n.label:'',
      color:isRelated?{background:c,border:'#111',highlight:{background:c,border:'#111'}}:{background:'#e8e2d8',border:'#ccc'},
      shape:'dot',size:isRelated?24:6,
      font:{size:isRelated?13:0,color:'#2c2416',face:'DM Sans',strokeWidth:2,strokeColor:'#fefdfb'},hidden:false,
    };
  });
  var visibleEdges=graphData.edges.filter(function(e){return relatedNodes.has(e.from)||relatedNodes.has(e.to);})
    .map(function(e){return {...e,color:{opacity:0.5,color:'#4a7c6f'},width:2,arrows:'to'};});
  network.setData({nodes:new vis.DataSet(visibleNodes),edges:new vis.DataSet(visibleEdges)});
}

// ======================== NL Query ========================
async function nlQuery(){
  var input=document.getElementById('nlInput').value.trim();
  if(!input)return;
  var btn=document.getElementById('nlBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  document.getElementById('answerBox').style.display='none';
  document.getElementById('explorationLog').style.display='none';
  document.getElementById('explorationLogInner').innerHTML='';
  syncSidebarSplitHandles();
  var endpoints={'oag':'/ontology/nl-query-oag','graph':'/ontology/nl-query-graph','batch':'/ontology/nl-query'};
  var endpoint=endpoints[nlQueryMode]||endpoints.oag;
  try{
    var resp=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:input})});
    var data=await resp.json();
    if(data.answer){
      var box=document.getElementById('answerBox');
      box.style.display='block';box.textContent=data.answer;
    }
    renderResults(data);
    if(nlQueryMode==='oag'){renderOagExploration(data.exploration_log||[], data.available_tools||[]);}
    else if(nlQueryMode==='graph'){renderExplorationPath(data.exploration_path||[], data.available_tools||[]);}
  }catch(e){
    document.getElementById('answerBox').style.display='block';
    document.getElementById('answerBox').textContent='Query failed: '+e.message;
  }finally{btn.disabled=false;btn.innerHTML='Query';}
}

function switchNlMode(mode){
  nlQueryMode=mode;
  document.getElementById('btn-mode-oag').classList.toggle('active',mode==='oag');
  document.getElementById('btn-mode-graph').classList.toggle('active',mode==='graph');
  document.getElementById('btn-mode-batch').classList.toggle('active',mode==='batch');
  var modeTag = document.getElementById('exploration-mode-tag');
  if(modeTag) modeTag.textContent = mode==='oag'?'AIP Logic':mode==='graph'?'Graph Walk':'Batch Plan';
  document.getElementById('explorationLog').style.display='none';
  document.getElementById('explorationLogInner').innerHTML='';
  document.getElementById('answerBox').style.display='none';
  syncSidebarSplitHandles();
  var inp=document.getElementById('nlInput');
  if(mode==='oag'){inp.placeholder='张三高等数学多少分';}
  else if(mode==='graph'){inp.placeholder='查张三所有课程的平均分';}
  else{inp.placeholder='查张三的所有成绩';}
}

function syncSidebarSplitHandles(){
  var answerHandle = document.getElementById('answer-exploration-resize-handle');
  var explorationPane = document.getElementById('explorationLog');
  if(!answerHandle || !explorationPane) return;
  answerHandle.style.display = getComputedStyle(explorationPane).display === 'none' ? 'none' : 'block';
}

/* ---- 每轮工具清单 ---- */
function buildRoundToolsHtml(tools, roundId){
  if(!tools||!tools.length) return '';
  var bodyId = roundId+'-tools';
  var html = '<div class="round-tools">'
    +'<div class="round-tools-header" onclick="toggleRoundTools(\''+bodyId+'\')">'
      +'<span class="round-tools-label">Available Tools ('+tools.length+')</span>'
      +'<span class="round-tools-arrow" id="'+bodyId+'-arrow">▶</span>'
    +'</div>'
    +'<div class="round-tools-body" id="'+bodyId+'">';
  tools.forEach(function(t){
    html += '<div class="round-tools-item">'
      +'<span class="ti-name">'+escHtml(t.name)+'</span>'
      +'<span class="ti-desc">'+escHtml((t.description||'').slice(0,80))+'</span>'
      +'</div>';
  });
  html += '</div></div>';
  return html;
}

function toggleRoundTools(bodyId){
  var body = document.getElementById(bodyId);
  if(!body) return;
  var open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  var arrow = document.getElementById(bodyId+'-arrow');
  if(arrow) arrow.textContent = open ? '▶' : '▼';
}

function renderOagExploration(log, availableTools){
  var logPane=document.getElementById('explorationLog');
  var logEl=document.getElementById('explorationLogInner');
  logPane.style.display='flex';
  syncSidebarSplitHandles();
  // 隐藏旧的全局工具面板
  var globalPanel=document.getElementById('tools-panel');
  if(globalPanel) globalPanel.style.display='none';
  if(!log||!log.length){logEl.innerHTML='<span class="muted">No steps (direct answer)</span>';return;}

  // 按轮次（step 值）分组
  var rounds={};
  log.forEach(function(step){
    var k = step.step;
    if(!rounds[k]) rounds[k]=[];
    rounds[k].push(step);
  });

  var html='';
  Object.keys(rounds).sort(function(a,b){return +a-+b;}).forEach(function(roundKey){
    var steps = rounds[roundKey];
    var reasoning = (steps[0] && steps[0].reasoning) ? steps[0].reasoning : '';
    var roundTools = (steps[0] && steps[0].available_tools) ? steps[0].available_tools : availableTools;
    var roundNum = +roundKey;
    var roundLabel = roundNum === 0 ? 'Init' : 'Round ' + roundNum;
    var roundId = 'round-oag-'+roundKey;

    html += '<div class="round-block">';
    html += '<div class="round-header" onclick="toggleRound(\''+roundId+'\')">'
      +'<span class="round-label">'+roundLabel+'</span>'
      +'<span class="round-calls">'+steps.length+' call'+(steps.length>1?'s':'')+'</span>'
      +'<span class="round-tools-badge">'+roundTools.length+' tools</span>'
      +'<span class="round-arrow">▶</span>'
      +'</div>';
    html += '<div class="round-body open" id="'+roundId+'">';
    if(reasoning) html += '<div class="reasoning-bubble">'+escHtml(reasoning.slice(0,300))+'</div>';
    steps.forEach(function(step){
      var inputStr = typeof step.input==='object' ? JSON.stringify(step.input) : String(step.input||'');
      if(inputStr.length>200) inputStr=inputStr.slice(0,200)+'…';
      html += '<div class="call-card">'
        +'<div class="call-card-header">'
          +'<span class="step-tag">OAG</span>'
          +'<span class="call-name">'+escHtml(step.tool)+'</span>'
          +'<span class="call-summary">'+escHtml(step.summary)+'</span>'
        +'</div>'
        +'<div class="call-input">'+escHtml(inputStr)+'</div>'
        +'</div>';
    });
    html += buildRoundToolsHtml(roundTools, roundId);
    html += '</div></div>';
  });
  logEl.innerHTML=html;
}

function renderExplorationPath(path, availableTools){
  var logPane=document.getElementById('explorationLog');
  var logEl=document.getElementById('explorationLogInner');
  logPane.style.display='flex';
  syncSidebarSplitHandles();
  var globalPanel=document.getElementById('tools-panel');
  if(globalPanel) globalPanel.style.display='none';
  if(!path||!path.length){logEl.innerHTML='<span class="muted">No steps</span>';return;}

  // 按轮次（step 值）分组
  var rounds={};
  path.forEach(function(step){
    var k = step.step;
    if(!rounds[k]) rounds[k]=[];
    rounds[k].push(step);
  });

  var html='';
  Object.keys(rounds).sort(function(a,b){return +a-+b;}).forEach(function(roundKey){
    var steps = rounds[roundKey];
    var reasoning = (steps[0] && steps[0].reasoning) ? steps[0].reasoning : '';
    var roundTools = (steps[0] && steps[0].available_tools) ? steps[0].available_tools : availableTools;
    var roundId = 'round-graph-'+roundKey;

    html += '<div class="round-block">';
    html += '<div class="round-header" onclick="toggleRound(\''+roundId+'\')">'
      +'<span class="round-label">Round '+roundKey+'</span>'
      +'<span class="round-calls">'+steps.length+' call'+(steps.length>1?'s':'')+'</span>'
      +'<span class="round-tools-badge">'+roundTools.length+' tools</span>'
      +'<span class="round-arrow">▶</span>'
      +'</div>';
    html += '<div class="round-body open" id="'+roundId+'">';
    if(reasoning) html += '<div class="reasoning-bubble">'+escHtml(reasoning.slice(0,300))+'</div>';
    steps.forEach(function(step){
      var inputStr = typeof step.tool_input==='object' ? JSON.stringify(step.tool_input) : String(step.tool_input||'');
      if(inputStr.length>200) inputStr=inputStr.slice(0,200)+'…';
      html += '<div class="call-card">'
        +'<div class="call-card-header">'
          +'<span class="step-tag" style="background:#eef0fa;color:#5060b0;">Walk</span>'
          +'<span class="call-name">'+escHtml(step.tool_name)+'</span>'
          +'<span class="call-summary">'+escHtml(step.tool_result_summary)+'</span>'
        +'</div>'
        +'<div class="call-input">'+escHtml(inputStr)+'</div>'
        +'</div>';
    });
    html += buildRoundToolsHtml(roundTools, roundId);
    html += '</div></div>';
  });
  logEl.innerHTML=html;
  animateExploration(path);
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function animateExploration(path){
  if(currentView!=='instance')switchView('instance');
  var allVisitedNodes=new Set(),allVisitedEdges=[];
  path.forEach(function(step){(step.visited_node_keys||[]).forEach(function(k){allVisitedNodes.add(k);});(step.visited_edges||[]).forEach(function(e){allVisitedEdges.push(e);});});
  if(allVisitedNodes.size===0)return;
  var existingNodes=network.body.data.nodes,existingEdges=network.body.data.edges;
  var updatedNodes=existingNodes.get().map(function(n){
    var isVisited=allVisitedNodes.has(n.id);
    var c=nodeColors[n.objectType||n.group]||'#c05050';
    return{id:n.id,color:isVisited?{background:c,border:'#111',highlight:{background:c,border:'#111'}}:{background:'#e8e2d8',border:'#ccc'},size:isVisited?24:6,font:{size:isVisited?13:8,color:isVisited?'#2c2416':'#bbb',face:'DM Sans',bold:!!isVisited,strokeWidth:isVisited?2:0,strokeColor:'#fefdfb'},borderWidth:isVisited?2:1};
  });
  var edgeMap={};
  allVisitedEdges.forEach(function(e){edgeMap[e.from+'|'+e.to]=true;});
  var updatedEdges=existingEdges.get().map(function(e){var k=e.from+'|'+e.to;var kr=e.to+'|'+e.from;var v=edgeMap[k]||edgeMap[kr];return{id:e.id,color:v?{color:'#b8402a',opacity:1}:{color:'#ddd',opacity:0.15},width:v?3:1};});
  network.setData({nodes:new vis.DataSet(updatedNodes),edges:new vis.DataSet(updatedEdges)});
  var lastStep=path[path.length-1],lastNodes=lastStep.visited_node_keys||[];
  if(lastNodes.length>0)setTimeout(function(){network.focus(lastNodes[lastNodes.length-1],{scale:1.2,animation:true});},300);
}

function renderResults(data){
  var el=document.getElementById('results');var html='';
  if(!data.success&&data.error){el.innerHTML='<div class="error-msg">Query failed: '+data.error+'</div>';return;}
  var derivedResults = deriveExplorationResults(data);
  if(data.operations&&data.operations.length>0){
    html+='<div style="font-size:10px;color:var(--ink-muted);margin-bottom:6px;">';
    html+=data.operations.map(function(o,i){return '<span style="background:var(--bg-base);padding:1px 5px;border-radius:2px;margin:0 2px;">'+(i+1)+'. '+o.op+'</span>';}).join(' &rarr; ');
    html+='</div>';
  }
  var resultEntries = data.results&&data.results.length>0 ? data.results : derivedResults;
  if(resultEntries&&resultEntries.length>0){
    resultEntries.forEach(function(r,i){
      if(r.error){html+='<div class="error-msg">Step '+(i+1)+': '+r.error+'</div>';return;}
      if(r.data===null||r.data===undefined){
        if(r.content){
          html+=renderResultText(r, i, resultEntries.length);
          return;
        }
        html+='<div class="muted">Step '+(i+1)+': no result</div>';return;
      }
      var stepLabel=resultEntries.length>1?'<span style="font-size:10px;color:var(--ink-muted);">Step '+(i+1)+':</span> ':'';
      if(Array.isArray(r.data)&&r.data.length>0){html+=stepLabel+renderTable(r.data);}
      else if(Array.isArray(r.data)&&r.data.length===0){html+='<div class="muted">'+stepLabel+'no data</div>';}
      else if(typeof r.data==='object'&&r.data!==null){html+=stepLabel+renderTable([r.data]);}
      else if(typeof r.data==='string'||typeof r.data==='number'){html+='<div style="font-size:16px;font-weight:600;color:var(--sage);">'+stepLabel+r.data+'</div>';}
      else if(r.content){html+=renderResultText(r, i, resultEntries.length);}
    });
  }
  el.innerHTML=html||'<span class="muted">Awaiting query&hellip;</span>';
}

function deriveExplorationResults(data){
  var steps = (data.exploration_log||[]).concat(data.exploration_path||[]);
  return steps.filter(function(step){
    return step.result_data !== undefined || step.result_content;
  }).map(function(step){
    return {
      data: step.result_data,
      content: step.result_content,
      error: step.result_error,
      label: step.tool || step.tool_name || ''
    };
  });
}

function renderResultText(result, index, total){
  var stepLabel = total>1 ? '<span style="font-size:10px;color:var(--ink-muted);">Step '+(index+1)+':</span> ' : '';
  var title = result.label ? '<div style="font-size:10px;color:var(--ink-muted);margin-bottom:4px;">'+escHtml(result.label)+'</div>' : '';
  return '<div style="margin-bottom:8px;">'+stepLabel+title+'<pre style="margin:0;white-space:pre-wrap;word-break:break-word;font-size:11px;line-height:1.5;color:var(--ink);background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius);padding:8px;">'+escHtml(result.content)+'</pre></div>';
}

function renderTable(items){
  if(!items.length)return'';
  var keys=Object.keys(items[0]).filter(function(k){return !k.startsWith('_');});
  var h='<table class="result-table"><thead><tr>';
  keys.forEach(function(k){h+='<th>'+k+'</th>';});
  h+='</tr></thead><tbody>';
  items.forEach(function(item){h+='<tr>';keys.forEach(function(k){var v=item[k];if(k==='passRate'||String(v).includes('%'))v='<span class="badge-tag '+(String(v).startsWith('0')?'badge-fail':'badge-pass')+'">'+v+'</span>';h+='<td>'+(v??'-')+'</td>';});h+='</tr>';});
  h+='</tbody></table>';
  return h;
}

// ======================== Actions ========================
async function doAction(name){
  var params={};
  if(name==='createScore'){params.studentSno=document.getElementById('cs_student').value.trim();params.courseCno=document.getElementById('cs_course').value.trim();params.scoreValue=parseFloat(document.getElementById('cs_score').value);params.examDate=document.getElementById('cs_date').value;}
  else if(name==='updateScore'){params.scoreId=parseInt(document.getElementById('us_id').value);params.scoreValue=parseFloat(document.getElementById('us_score').value);}
  else if(name==='assignTeacher'){params.courseCno=document.getElementById('at_course').value.trim();params.teacherTno=document.getElementById('at_teacher').value.trim();}
  else if(name==='deleteScore'){params.scoreId=parseInt(document.getElementById('ds_id').value);}
  try{
    var resp=await fetch('/ontology/actions/'+name,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({params:params})});
    var data=await resp.json();
    var cls=data.success?'success-msg':'error-msg';
    document.getElementById('results').innerHTML='<div class="'+cls+'">'+(data.success?'✓':'✗')+' '+(data.message||data.error||JSON.stringify(data))+'</div>';
    if(data.success){fetch('/ontology/graph').then(function(r){return r.json();}).then(function(d){graphData=d;if(currentView==='instance')renderInstanceGraph(instanceFilter);});}
  }catch(e){document.getElementById('results').innerHTML='<div class="error-msg">'+e.message+'</div>';}
}

// ======================== Bottom Panel Tabs ========================
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  var btn = document.querySelector('.tab-btn[data-tab="' + name + '"]');
  if (btn) btn.classList.add('active');
  var content = document.getElementById('tab-' + name);
  if (content) content.classList.add('active');
  if (name === 'rawtables' && !window._rawTablesLoaded) {
    window._rawTablesLoaded = true;
    loadRawTables();
  }
}

}

// ======================== Raw Tables ========================
async function loadRawTables() {
  try {
    var resp = await fetch('/ontology/tables');
    var data = await resp.json();
    if (!data.success) return;
    var tables = data.tables;
    var tableOrder = ['student', 'teacher', 'course', 'tc', 'score', 'audit_log'];
    var fkCols = {score: ['Sno', 'Cno'], tc: ['Cno', 'Tno']};
    var pkCols = {student: ['Sno'], teacher: ['Tno'], course: ['Cno'], tc: ['Cno', 'Tno'], score: ['id'], audit_log: ['id']};
    var html = '';
    tableOrder.forEach(function(tblName) {
      var tbl = tables[tblName];
      if (!tbl) return;
      var colNames = tbl.columns.map(function(c) { return c.name; });
      var fks = fkCols[tblName] || [];
      var tableHtml = '<table><thead><tr>';
      colNames.forEach(function(c) { tableHtml += '<th>' + c + '</th>'; });
      tableHtml += '</tr></thead><tbody>';
      tbl.data.forEach(function(row) {
        tableHtml += '<tr>';
        colNames.forEach(function(c) {
          var cls = '';
          if ((pkCols[tblName] || []).indexOf(c) >= 0) cls = 'col-pk';
          else if (fks.indexOf(c) >= 0) cls = 'col-fk';
          tableHtml += '<td class="' + cls + '">' + (row[c] ?? 'NULL') + '</td>';
        });
        tableHtml += '</tr>';
      });
      tableHtml += '</tbody></table>';
      var tblId = 'tbl-' + tblName;
      html += '<div class="raw-table-header" onclick="toggleRawTable(\'' + tblId + '\', this)">'
        + '<span><span class="tbl-name">' + tblName + '</span>'
        + '<span class="tbl-meta" style="margin-left:8px;">' + tbl.columns.length + ' cols &middot; ' + tbl.row_count + ' rows</span></span>'
        + '<span class="tbl-arrow">▶</span>'
        + '</div>'
        + '<div class="raw-table-body" id="' + tblId + '">' + tableHtml + '</div>';
    });
    document.getElementById('raw-tables-list').innerHTML = html;
  } catch(e) {
    document.getElementById('raw-tables-list').innerHTML =
      '<div class="error-msg">Failed to load tables: ' + e.message + '</div>';
  }
}

function toggleRawTable(id, header) {
  var body = document.getElementById(id);
  var isOpen = body.classList.contains('open');
  if (isOpen) { body.classList.remove('open'); header.classList.remove('open'); }
  else { body.classList.add('open'); header.classList.add('open'); }
}

// ======================== Bottom Panel Resize ========================
(function(){
  var handle = document.getElementById('resize-handle');
  var panel = document.getElementById('bottom-panel');
  var isDragging = false, startY = 0, startH = 0;
  handle.addEventListener('mousedown', function(e){
    if(panel.classList.contains('collapsed')) return;
    isDragging = true; startY = e.clientY; startH = panel.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    var delta = startY - e.clientY;
    var newH = Math.max(48, Math.min(window.innerHeight * 0.75, startH + delta));
    panel.style.height = newH + 'px';
  });
  document.addEventListener('mouseup', function(){
    if(isDragging){ isDragging = false; handle.classList.remove('dragging'); document.body.style.cursor=''; document.body.style.userSelect=''; }
  });
})();
